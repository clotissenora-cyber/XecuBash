# XecuBash - Perfiles AppArmor
# Configuración de seguridad basada en permisos

#include <tunables/global>

profile xecubash-security flags=(attach_disconnected,mediate_deleted) {
  #include <abstractions/base>
  #include <abstractions/bash>
  #include <abstractions/nameservice>

  # Permisos de lectura en directorios críticos
  /etc/passwd r,
  /etc/group r,
  /etc/shadow r,
  /etc/sudoers r,
  /etc/ssh/sshd_config r,
  /etc/ssl/** r,

  # Permisos de ejecución
  /bin/** mix,
  /sbin/** mix,
  /usr/bin/** mix,
  /usr/sbin/** mix,
  /usr/local/bin/** mix,
  /usr/local/sbin/** mix,

  # Directorios de trabajo
  /tmp/** rw,
  /var/tmp/** rw,
  /var/log/** w,
  /var/log/auth.log w,
  /var/log/syslog w,

  # Inicio de procesos
  /bin/bash ix,
  /bin/dash ix,
  /bin/sh ix,

  # Acceso a dispositivos
  /dev/null rw,
  /dev/zero rw,
  /dev/full rw,
  /dev/random r,
  /dev/urandom r,
  /dev/tty rw,
  /dev/pts/* rw,

  # Deniegos explícitos
  deny /root/** rwkl,
  deny /home/** rwkl,
  deny /etc/shadow w,
  deny /etc/gshadow w,
  deny /etc/sudoers w,
  deny /sys/** w,
  deny /proc/** w,
  deny /dev/mem rw,
  deny /dev/kmem rw,
  deny /dev/port rw,
}

# Perfil para servicios de red
profile xecubash-network flags=(attach_disconnected,mediate_deleted) {
  #include <abstractions/base>
  #include <abstractions/nameservice>
  #include <abstractions/openssl>

  # Permisos de red
  network inet stream,
  network inet dgram,
  network unix stream,
  network unix dgram,

  # Binding a puertos
  capability net_bind_service,
  capability net_raw,
  capability net_admin,

  # Acceso a puertos
  /etc/services r,
  /etc/protocols r,
  /etc/resolv.conf r,
  /etc/nsswitch.conf r,

  # Certificates y keys
  /etc/ssl/certs/** r,
  /etc/ssl/private/** r,
  /etc/ssl/openssl.cnf r,

  # Logs
  /var/log/network.log w,
  /var/log/firewall.log w,
}

# Perfil para el demonio SSH
profile xecubash-ssh {
  #include <abstractions/base>
  #include <abstractions/nameservice>
  #include <abstractions/openssl>
  #include <abstractions/ssh-server>

  capability chown,
  capability dac_override,
  capability setgid,
  capability setuid,
  capability sys_chroot,
  capability sys_tty_config,
  capability kill,
  capability net_bind_service,

  /etc/ssh/sshd_config r,
  /etc/ssh/ssh_host_* r,
  /var/log/auth.log w,
  /var/run/sshd.pid rw,
  /var/run/sshd/ rw,
}
