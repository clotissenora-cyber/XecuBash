# Configuración global
[general]
listens = ["127.0.0.1:53", "[::1]:53"]
max_clients = 250
ipv4_servers = true
ipv6_servers = false
ddns_servers = false
dnssec_servers = false
stamping_delay = 10
keep_alive = 30
log_level = 2
log_file = "/var/log/dnscrypt-proxy/dnscrypt-proxy.log"
use_syslog = false

# Timeout y reintentos
[timeouts]
stamp_lookup = 10
value = 15
init_timeout = 8
keep_alive = 30
fallback_resolver_delay = 1

# Caché
[cache]
capacity = 4096
min_ttl = 2400
max_ttl = 86400
negative_min_ttl = 60
negative_max_ttl = 600

# Prefijo de logs
[log]
file = "/var/log/dnscrypt-proxy/dnscrypt-proxy.log"
format = "text"
log_everything = false
