# XecuBash - Configuración de VPN
# Configuración para OpenVPN y WireGuard

[openvpn]
# Archivo de configuración
CONFIG_FILE=/etc/openvpn/client/config.ovpn

# Protocolo
PROTOCOL=udp
PORT=1194

# Cifrado
CIPHER=AES-256-GCM
AUTH=SHA256

# Certificados y keys
CA_CERT=/etc/openvpn/ca.crt
CLIENT_CERT=/etc/openvpn/client.crt
CLIENT_KEY=/etc/openvpn/client.key
TLS_CRYPT=/etc/openvpn/ta.key

# Dirección del servidor
REMOTE_SERVER=vpn.example.com
REMOTE_PORT=1194

# Configuración de red
DEV=tun0
PROTO=udp
RESOLV_RETRY=infinite
NOBIND=1

# Autenticación
AUTH_USER_PASS=/etc/openvpn/auth.txt

# Comprimisión
COMPRESS=lz4

# Keep-alive
KEEP_ALIVE=10 120

# TLS
TLS_VERSION_MIN=1.2
TLS_CIPHER=DEFAULT:!aNULL:!eNULL:!MD5:!3DES:!DES:!RC4:!IDEA:!SEED:!aDSS:!SRP:!PSK

[wireguard]
# Interfaz
INTERFACE=wg0

# Dirección local
ADDRESS=10.0.0.2/32

# Ruta DNS
DNS=1.1.1.1

# Clave privada
PRIVATE_KEY_FILE=/etc/wireguard/privatekey

# Servidor remoto
PEER_PUBLIC_KEY=
PEER_ENDPOINT=vpn.example.com:51820
PEER_ALLOWED_IPS=0.0.0.0/0

# Keep-alive
PERSISTENT_KEEPALIVE=25

# Tabla de enrutamiento
TABLE=auto

# MTU
MTU=1420

# Directo de UDP
LISTEN_PORT=51820

[general]
# Habilitar VPN al iniciar
AUTO_START=1

# Tipo de VPN por defecto
DEFAULT_VPN_TYPE=openvpn

# Validar conexión
VALIDATE_CONNECTION=1
VALIDATE_INTERVAL=300

# Log
LOG_ENABLED=1
LOG_FILE=/var/log/vpn.log
LOG_LEVEL=INFO

# Kill switch (desconectar si VPN cae)
KILL_SWITCH_ENABLED=1
KILL_SWITCH_INTERFACE=

# DNS filtering
DNS_FILTER_ENABLED=1
DNS_FILTER_MALWARE=1
DNS_FILTER_ADULT=0

# Split tunneling (aplicaciones que no usan VPN)
SPLIT_TUNNEL_ENABLED=0
SPLIT_TUNNEL_APPS=
