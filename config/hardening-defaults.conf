# XecuBash - Configuración por Defecto del Hardening
# Parámetros predeterminados para securización del sistema

[kernel]
# Deshabilitar SysRq (prevenir reboot forzado)
KERNEL_SYSRQ=0

# Protección contra IP spoofing
KERNEL_RP_FILTER=1

# Deshabilitar ICMP redirects
KERNEL_SEND_REDIRECTS=0
KERNEL_ACCEPT_REDIRECTS=0

# Protección contra SYN flood
KERNEL_TCP_SYNCOOKIES=1
KERNEL_TCP_SYN_RETRIES=2
KERNEL_TCP_SYNACK_RETRIES=2
KERNEL_TCP_MAX_SYN_BACKLOG=4096

# Protección contra bad error messages
KERNEL_ICMP_IGNORE_BOGUS_ERROR_RESPONSES=1

# Logs de paquetes sospechosos
KERNEL_LOG_MARTIANS=1

# ASLR (Address Space Layout Randomization)
KERNEL_RANDOMIZE_VA_SPACE=2

# Deshabilitar core dumps
KERNEL_CORE_USES_PID=1
KERNEL_FS_SUID_DUMPABLE=0

# Restricción de ptrace
KERNEL_YAMA_PTRACE_SCOPE=2

[filesystem]
# Límite de descriptores de archivos
FILE_MAX=2097152

# Umask para archivos nuevos
UMASK=0077

# Protección contra core dumps
ULIMIT_CORE=0

[network]
# Deshabilitar IPv6 (opcional)
DISABLE_IPV6=0

# Forwarding de IP
IP_FORWARD=0

# Validación de fuente de ruta
RP_FILTER=1

[ssh]
# Puerto SSH (cambiar de 22)
SSH_PORT=2222

# PermitRootLogin
SSH_PERMIT_ROOT_LOGIN=no

# PasswordAuthentication
SSH_PASSWORD_AUTHENTICATION=no

# PubkeyAuthentication
SSH_PUBKEY_AUTHENTICATION=yes

# PermitEmptyPasswords
SSH_PERMIT_EMPTY_PASSWORDS=no

# X11Forwarding
SSH_X11_FORWARDING=no

# AllowTcpForwarding
SSH_ALLOW_TCP_FORWARDING=no

# ClientAliveInterval (segundos)
SSH_CLIENT_ALIVE_INTERVAL=300

# ClientAliveCountMax
SSH_CLIENT_ALIVE_COUNT_MAX=2

[services]
# Servicios a deshabilitar
DISABLE_SERVICES="avahi-daemon cups isc-dhcp-server bind9 vsftpd snmpd rsync telnet ftp rsh rlogin nis tftp talk"

# Servicios a habilitar
ENABLE_SERVICES="sshd ssh auditd rsyslog systemd-resolved"

[logging]
# Habilitar auditd
AUDIT_ENABLED=1

# Auditar cambios en sudoers
AUDIT_SUDOERS=1

# Auditar cambios en SSH
AUDIT_SSH=1

# Auditar cambios en passwd
AUDIT_PASSWD=1

# Archivo de logs de auditoría
AUDIT_LOG_FILE=/var/log/audit/audit.log

# Máximo tamaño de archivo de log
AUDIT_LOG_MAX_SIZE=500M

# acción cuando disco lleno
AUDIT_DISK_FULL_ACTION=SUSPEND

[firewall]
# Habilitar firewall por defecto
FIREWALL_ENABLED=1

# Política por defecto de entrada
FIREWALL_DEFAULT_POLICY_INCOMING=DENY

# Política por defecto de salida
FIREWALL_DEFAULT_POLICY_OUTGOING=ALLOW

# Log de paquetes rechazados
FIREWALL_LOG_REJECT=1

[security]
# Requerir contraseña en GRUB
GRUB_REQUIRE_PASSWORD=1

# Tiempo de sesión inactiva (minutos)
SESSION_TIMEOUT=15

# Umask para sudo
SUDO_UMASK=0077

# Protección de memoria
MEMORY_PROTECTION=1

[backups]
# Directorio de backups
BACKUP_DIR=/var/backups/xecubash

# Retención de backups (días)
BACKUP_RETENTION=30

# Compresión de backups
BACKUP_COMPRESSION=gzip

# Cifrar backups
BACKUP_ENCRYPTION=1
