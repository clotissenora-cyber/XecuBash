# XecuBash - Configuración de Sistema
# Parámetros globales y variables de entorno

[project]
NAME=XecuBash
VERSION=1.0.0
DESCRIPTION=Herramienta integral de ciberseguridad para Debian 13 Trixie
AUTHOR=clotissenora-cyber
REPO=https://github.com/clotissenora-cyber/XecuBash
LICENSE=Apache License 2.0

[paths]
BIN_DIR=/usr/local/bin
LIB_DIR=/usr/local/lib/xecubash
CONFIG_DIR=/etc/xecubash
LOG_DIR=/var/log/xecubash
DATA_DIR=/var/lib/xecubash
BACKUP_DIR=/var/backups/xecubash
TMP_DIR=/tmp/xecubash
DOC_DIR=/usr/local/share/doc/xecubash
MAN_DIR=/usr/local/share/man/man1

[logging]
LOG_LEVEL=INFO
LOG_FORMAT=text
LOG_FILE=/var/log/xecubash/xecubash.log
MAX_LOG_SIZE=100M
LOG_RETENTION_DAYS=30
LOG_COMPRESSION=gzip
DEBUG_MODE=0
QUIET_MODE=0

[system]
OS_REQUIRED=debian
OS_VERSION_REQUIRED=13
KERNEL_VERSION_MIN=5.10
BASH_VERSION_MIN=4.0
REQUIRED_TOOLS="bash systemctl curl wget grep sed awk"

[security]
# Modo de operación por defecto
DEFAULT_MODE=dry-run

# Requerir confirmación para cambios críticos
REQUIRE_CONFIRMATION=1

# Crear snapshots automáticos
AUTO_SNAPSHOT_ENABLED=1

# Integridad de archivo
CHECK_FILE_INTEGRITY=1
INTEGRITY_CHECK_INTERVAL=86400

# Validación de cambios
VALIDATE_CHANGES=1
VALIDATE_AFTER_APPLY=1

[network]
# Timeout de red (segundos)
NETWORK_TIMEOUT=10

# Reintentos de conexión
CONNECTION_RETRIES=3
CONNECTION_RETRY_DELAY=5

# Velocidad de red límite
RATE_LIMIT_ENABLED=0
RATE_LIMIT_SPEED=1M

[audit]
# Habilitar auditoría
AUDIT_ENABLED=1

# Auditar todas las acciones
AUDIT_VERBOSE=1

# Retención de auditoría (días)
AUDIT_RETENTION=90

# Archivo de auditoría
AUDIT_LOG=/var/log/xecubash/audit.log

[updates]
# Verificar actualizaciones
CHECK_UPDATES=1
CHECK_UPDATES_INTERVAL=604800

# Actualizar automáticamente
AUTO_UPDATE=0

# URL del repositorio
UPDATE_URL=https://github.com/clotissenora-cyber/XecuBash/releases

[notifications]
# Habilitar notificaciones
NOTIFICATIONS_ENABLED=1

# Notificaciones por correo
EMAIL_NOTIFICATIONS=0
EMAIL_ADDRESS=

# Notificaciones de alerta
ALERT_ON_ERROR=1
ALERT_ON_WARNING=0

[performance]
# Threads paralelos
MAX_THREADS=4

# Timeout de operaciones largas (segundos)
LONG_OPERATION_TIMEOUT=300

# Cache de resultados
ENABLE_CACHE=1
CACHE_TTL=3600

[testing]
# Modo de prueba
TEST_MODE=0

# Pruebas de penetración
PENETRATION_TEST_MODE=0

# Verbosidad de pruebas
TEST_VERBOSE=1

[backup]
# Retención de backups (días)
BACKUP_RETENTION_DAYS=30

# Compresión de backups
BACKUP_COMPRESSION=gzip

# Cifrado de backups
BACKUP_ENCRYPTION=1
BACKUP_ENCRYPTION_KEY=/etc/xecubash/backup.key

# Almacenamiento remoto
REMOTE_BACKUP_ENABLED=0
REMOTE_BACKUP_URL=
REMOTE_BACKUP_USERNAME=
REMOTE_BACKUP_PASSWORD=
