# XecuBash - Configuración de Tor
# Conexiones y enrutamiento a través de Tor

# Puerto SOCKS para aplicaciones
SocksPort 127.0.0.1:9050
SocksPort 127.0.0.1:9051

# Puerto de control
ControlPort 127.0.0.1:9052

# Autenticación por cookie
CookieAuthentication 1

# Política de salida (restrictiva)
ExitPolicy reject *:*

# Logging
Log notice file /var/log/tor/notices.log
Log info file /var/log/tor/info.log

# Directorio de datos
DataDirectory /var/lib/tor

# Directorio de cachings
CacheDirectory /var/lib/tor

# Nivel de logging
LogMessageDomains 1
TrustHostname 0

# Configuración de red
MaxCircuitDirtiness 600
MaxClientCircuitsPending 32

# Bandwidth limits (en bytes/second)
BandwidthRate 1 MB
BandwidthBurst 2 MB

# Tiempo de conexión
ConnectTimeout 10
CircuitIdleTimeout 1800

# Bootstrap
BootstrapTrackerStatus 0

# Rotación de circuitos
NewCircuitPeriod 600

# Configuración de entrada de relay (opcional)
# ORPort 127.0.0.1:9001
# DirPort 127.0.0.1:9030
# Nickname XecuBashRelay
# RelayBandwidthRate 1 MB
# RelayBandwidthBurst 2 MB

# Configuración de bridge (si es necesario)
# UseBridges 1
# Bridge obfs4 [IP]:[PORT] [FINGERPRINT]
