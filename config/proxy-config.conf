# XecuBash - Configuración de Proxy SOCKS5
# Proxys y cadenas de proxys para anonimato

# Proxy primario
PRIMARY_PROXY_TYPE=socks5
PRIMARY_PROXY_HOST=127.0.0.1
PRIMARY_PROXY_PORT=9050
PRIMARY_PROXY_USERNAME=
PRIMARY_PROXY_PASSWORD=
PRIMARY_PROXY_ENABLED=1

# Proxy secundario (fallback)
SECONDARY_PROXY_TYPE=socks5
SECONDARY_PROXY_HOST=
SECONDARY_PROXY_PORT=
SECONDARY_PROXY_USERNAME=
SECONDARY_PROXY_PASSWORD=
SECONDARY_PROXY_ENABLED=0

# Cadena de proxys (Múltiples capas de anonimato)
PROXY_CHAIN_ENABLED=0
PROXY_CHAIN_LENGTH=3

# Configuración de aplicaciones
APP_FIREFOX_ENABLED=1
APP_FIREFOX_PROXY=socks5h://127.0.0.1:9050

APP_CHROMIUM_ENABLED=1
APP_CHROMIUM_PROXY=socks5://127.0.0.1:9050

APP_CURL_ENABLED=1
APP_CURL_PROXY=socks5://127.0.0.1:9050

APP_WGET_ENABLED=1
APP_WGET_PROXY=socks5://127.0.0.1:9050

# Validación de proxy
VALIDATE_PROXY_ENABLED=1
VALIDATE_PROXY_URL=http://ipinfo.io
VALIDATE_PROXY_INTERVAL=3600

# Timeout
PROXY_CONNECT_TIMEOUT=10
PROXY_READ_TIMEOUT=30
PROXY_WRITE_TIMEOUT=30

# Reintentos
PROXY_MAX_RETRIES=3
PROXY_RETRY_DELAY=5

# Log
PROXY_LOG_ENABLED=1
PROXY_LOG_FILE=/var/log/proxy.log
PROXY_LOG_LEVEL=INFO
